# Mitra runtime configuration (DESIGN.md §7)

robot:
  backend: reachy          # reachy (real Lite over USB, or --sim daemon) | fake
  mic_chunk_s: 0.08        # seconds of audio per microphone read

models:
  llm:
    provider: ollama       # ollama | anthropic | bedrock (Option B, DESIGN §1.5)
    host: "http://localhost:11434"
    id: "qwen3-vl:8b-instruct"  # NOT the bare :8b tag — that is the "thinking"
                                # variant: slow and returns empty content
    keep_alive: "30m"      # keeps the model resident between turns (REQUIREMENTS §8)
    temperature: 0.3
  asr:
    # turbo: half the download of large-v3 and 4-6x faster decoding at
    # near-equal en/kn accuracy — the first latency lever in REQUIREMENTS §8
    default: "mlx-community/whisper-large-v3-turbo"
    sanskrit: null         # HF repo of a Sanskrit Whisper fine-tune, once selected (Phase 3)
    backend: "mlx"
    device: "mps"
  tts:
    engine: "indic-parler-tts"
    model: "ai4bharat/indic-parler-tts"
    fallback: "facebook/mms-tts-hin"   # ungated VITS; auto-used when parler is inaccessible
    device: "mps"
  wake:
    # asr: a small Whisper transcribes short speech windows and matches the
    # phrase — "hey mitra" works with no training. openwakeword: the target
    # engine once the custom "mitra" onnx model is trained (Phase 1, FR-1.4).
    engine: "asr"
    phrase: "mitra"
    asr_model: "mlx-community/whisper-tiny"
    model: "models/mitra.onnx"   # used by engine: openwakeword
    threshold: 0.6
  vad:
    engine: "silero"       # silero | energy (dependency-free fallback)
    min_speech_s: 0.3
    min_silence_s: 0.8
    max_utterance_s: 15.0

agent:
  deterministic_vision: false   # true = orchestrator-mediated capture_image (DESIGN §1.4)

cloud_fallback:                 # FR-6.3 — no key/provider configured == feature absent
  enabled: false
  provider: null
  model_id: null

session:
  silence_timeout_s: 30
  max_reply_chars: 220

lexicon:
  db_path: "data/lexicon.db"

logging:
  dir: "logs"
  debug: false
